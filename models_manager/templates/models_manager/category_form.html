{% extends 'models_manager/base.html' %}

{% block content %}
<h2>Создание папки</h2>
<form method="post">
    {% csrf_token %}
    <div class="mb-3">
        <label class="form-label">{{ form.name.label }}</label>
        {{ form.name }}
    </div>
    <div class="mb-3">
        <label class="form-label">{{ form.parent.label }}</label>
        {{ form.parent }}
        <div class="form-text">Оставьте пустым, чтобы создать корневую папку</div>
    </div>
    <button type="submit" class="btn btn-success">Сохранить</button>
    <a href="{% url 'models_manager:category_list' %}" class="btn btn-secondary">Отмена</a>
</form>
{% endblock %}
