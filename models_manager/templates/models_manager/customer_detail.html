{% extends 'models_manager/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Данные заказчика</h3>
                <p><strong>Модель:</strong> {{ model.name }} v{{ model.version }}</p>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Заказчик (ФИО)</label>
                        <input type="text" name="customer_name" class="form-control" value="{{ model.customer_name|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Телефон</label>
                        <input type="text" name="customer_phone" class="form-control" value="{{ model.customer_phone|default:'' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="customer_email" class="form-control" value="{{ model.customer_email|default:'' }}">
                    </div>
                    <button type="submit" class="btn btn-primary">Сохранить</button>
                    <a href="{% url 'models_manager:model_list' %}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
